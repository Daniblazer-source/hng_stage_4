services:
  api:
    image: swift-deploy-1-node:latest
    environment:
      - MODE=canary
      - APP_PORT=3000
    networks:
      - swiftdeploy-net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    user: "1000:1000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3000/healthz')"]
      interval: 10s
    volumes:
      - api_logs:/var/log/app

  # --- The Brain (OPA Sidecar) ---
  opa:
    image: openpolicyagent/opa:latest
    container_name: hng_4-opa
    ports:
      - "8181:8181"
    volumes:
      - ./policies:/policies
    command:
      - "run"
      - "--server"
      - "--addr"
      - ":8181"
      - "/policies"
    networks:
      - swiftdeploy-net

  nginx:
    image: nginx:latest
    ports:
      - "8081:8081"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - swiftdeploy-net
    depends_on:
      api:
        condition: service_healthy

networks:
  swiftdeploy-net:
    driver: bridge

volumes:
  api_logs: